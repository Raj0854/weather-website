<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>Weather Info 🌦️</h2>
        <form>
            <div class="city1">

                <input type="text" id="city" >

        </form>
        <div id="msg">
            <p> City 🏙️ : </p>
            <p>Temperature 🌡️: </p>
            <p>Humidity 💧 : </p>
            <p>Wind 💨: </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
